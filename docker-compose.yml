services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tokenbudget
      POSTGRES_USER: tokenbudget
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenbudget"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "2727:2727"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tokenbudget:localdev@postgres:5432/tokenbudget
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-change-in-production
      ADMIN_KEY: local-admin-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:2727"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
